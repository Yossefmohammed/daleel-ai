<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1326; }
        /* Floating button */
        #cp-btn {
            position: fixed; bottom: 28px; right: 28px; z-index: 9999;
            width: 54px; height: 54px; border-radius: 50%;
            background: linear-gradient(135deg, #007acc, #00d9ff);
            border: none; cursor: pointer; font-size: 22px;
            box-shadow: 0 6px 24px rgba(0,217,255,.45);
            display: flex; align-items: center; justify-content: center;
            color: #0d1326; font-weight: 700;
            transition: transform 0.2s;
        }
        #cp-btn:hover { transform: scale(1.1); }
        /* Chat panel */
        #cp-panel {
            position: fixed; bottom: 96px; right: 28px; z-index: 9998;
            width: 360px; height: 520px;
            background: #0d1326; border: 1px solid rgba(0,217,255,.25);
            border-radius: 18px; display: none; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,.6);
            overflow: hidden;
        }
        #cp-panel.open { display: flex; }
        #cp-hdr {
            background: linear-gradient(135deg,#007acc22,#00d9ff11);
            padding: 14px 16px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(0,217,255,.15);
        }
        .cp-gem {
            width: 32px; height: 32px; border-radius: 9px;
            background: linear-gradient(135deg,#007acc,#00d9ff);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .cp-title { font-size: 13.5px; font-weight: 700; color: #e8eeff; }
        .cp-sub { font-size: 10px; color: #3d4a6a; }
        #cp-close {
            margin-left: auto; background: none; border: none;
            color: #3d4a6a; font-size: 18px; cursor: pointer;
        }
        #cp-close:hover { color: #e8eeff; }
        #cp-msgs {
            flex: 1; overflow-y: auto; padding: 14px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .cp-msg {
            max-width: 88%; font-size: 13px; line-height: 1.65;
            padding: 10px 13px; border-radius: 14px; word-break: break-word;
        }
        .cp-msg.bot {
            background: #111829; border: 1px solid rgba(255,255,255,.06);
            color: #e8eeff; border-top-left-radius: 4px; align-self: flex-start;
        }
        .cp-msg.usr {
            background: linear-gradient(135deg,#00527a,#007cc2);
            color: #fff; border-top-right-radius: 4px; align-self: flex-end;
        }
        .cp-typing {
            display: flex; gap: 4px; padding: 12px 14px;
            align-items: center; align-self: flex-start;
        }
        .cp-typing span {
            width: 6px; height: 6px; border-radius: 50%;
            background: #00d9ff; animation: blink 1.2s infinite;
        }
        .cp-typing span:nth-child(2) { animation-delay: 0.2s; }
        .cp-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
        #cp-chips {
            padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 6px;
        }
        .cp-chip {
            font-size: 11px; font-weight: 600; padding: 5px 11px;
            border-radius: 20px; background: rgba(0,217,255,.08);
            border: 1px solid rgba(0,217,255,.2); color: #00d9ff;
            cursor: pointer;
        }
        #cp-form {
            border-top: 1px solid rgba(255,255,255,.06);
            padding: 10px 12px; display: flex; gap: 8px;
            align-items: flex-end;
        }
        #cp-input {
            flex: 1; background: #111829; border: 1px solid rgba(255,255,255,.10);
            border-radius: 10px; padding: 9px 12px; color: #e8eeff;
            font-size: 13px; resize: none; outline: none; max-height: 90px;
        }
        #cp-input:focus { border-color: #00d9ff; }
        #cp-send {
            background: linear-gradient(135deg,#007acc,#00d9ff);
            border: none; width: 36px; height: 36px; border-radius: 9px;
            cursor: pointer; font-size: 16px; font-weight: bold;
            color: #0d1326;
        }
        #cp-notif {
            position: absolute; top: -4px; right: -4px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #f87171; font-size: 9px; font-weight: 700;
            color: #fff; display: none; align-items: center;
            justify-content: center; border: 2px solid #0d1326;
        }
    </style>
</head>
<body>
    <div id="cp-btn">💬<div id="cp-notif">1</div></div>
    <div id="cp-panel">
        <div id="cp-hdr">
            <div class="cp-gem">🎯</div>
            <div><div class="cp-title">Career AI</div><div class="cp-sub">Your advisor</div></div>
            <button id="cp-close">✕</button>
        </div>
        <div id="cp-msgs"></div>
        <div id="cp-chips"></div>
        <div id="cp-form">
            <textarea id="cp-input" placeholder="Ask anything..." rows="1"></textarea>
            <button id="cp-send">➤</button>
        </div>
    </div>

    <script>
        // ---------- CONFIGURATION ----------
        const GROQ_API_KEY = "YOUR_GROQ_API_KEY";   // <-- replace with your key
        const SYSTEM_PROMPT = "You are a warm, expert career advisor called Career AI. Keep answers concise and actionable.";

        let isOpen = false, greeted = false;
        let messages = [];

        // ---------- DOM elements ----------
        const btn = document.getElementById('cp-btn');
        const panel = document.getElementById('cp-panel');
        const closeBtn = document.getElementById('cp-close');
        const sendBtn = document.getElementById('cp-send');
        const input = document.getElementById('cp-input');
        const msgsDiv = document.getElementById('cp-msgs');
        const chipsDiv = document.getElementById('cp-chips');
        const notif = document.getElementById('cp-notif');

        // ---------- Helper functions ----------
        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `cp-msg ${role}`;
            div.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
                .replace(/\*(.*?)\*/g,'<em>$1</em>')
                .replace(/(^|\n)[•\-*] (.+)/g,'$1<li>$2</li>')
                .replace(/\n/g,'<br>');
            if (div.innerHTML.indexOf('<li>') !== -1)
                div.innerHTML = '<ul style="padding-left:16px;margin:6px 0">' + div.innerHTML + '</ul>';
            msgsDiv.appendChild(div);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        function showTyping() {
            let typing = document.getElementById('cp-typing');
            if (typing) typing.remove();
            typing = document.createElement('div');
            typing.id = 'cp-typing';
            typing.className = 'cp-typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            msgsDiv.appendChild(typing);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }
        function hideTyping() {
            const t = document.getElementById('cp-typing');
            if (t) t.remove();
        }

        async function sendToAI(text) {
            addMsg('usr', text);
            messages.push({ role: 'user', content: text });
            showTyping();
            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            ...messages.slice(-12)
                        ],
                        temperature: 0.75,
                        max_tokens: 500
                    })
                });
                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || "Sorry, something went wrong.";
                hideTyping();
                addMsg('bot', reply);
                messages.push({ role: 'assistant', content: reply });
            } catch (e) {
                hideTyping();
                addMsg('bot', "Network error. Please try again.");
            }
        }

        function renderChips() {
            chipsDiv.innerHTML = '';
            const suggestions = [
                "How can I improve my CV?",
                "What skills should I learn?",
                "How do I negotiate salary?",
                "Am I ready for a senior role?"
            ];
            suggestions.forEach(q => {
                const chip = document.createElement('button');
                chip.className = 'cp-chip';
                chip.textContent = q;
                chip.onclick = () => {
                    chipsDiv.innerHTML = '';
                    sendToAI(q);
                };
                chipsDiv.appendChild(chip);
            });
        }

        function greet() {
            addMsg('bot', "Hey! 👋 I'm your Career AI advisor. Ask me anything — CV tips, job search, salary negotiation, skill gaps, interview prep…");
            renderChips();
        }

        function togglePanel() {
            isOpen = !isOpen;
            if (isOpen) {
                panel.classList.add('open');
                notif.style.display = 'none';
                if (!greeted) { greet(); greeted = true; }
                input.focus();
            } else {
                panel.classList.remove('open');
            }
        }

        // ---------- Event binding (works every time) ----------
        btn.onclick = togglePanel;
        closeBtn.onclick = togglePanel;
        sendBtn.onclick = () => {
            const val = input.value.trim();
            if (val) {
                input.value = '';
                sendToAI(val);
            }
        };
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const val = input.value.trim();
                if (val) {
                    input.value = '';
                    sendToAI(val);
                }
            }
        };
        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 90) + 'px';
        };

        // Show notification after 3 seconds if panel is closed
        setTimeout(() => {
            if (!isOpen) notif.style.display = 'flex';
        }, 3000);
    </script>
</body>
</html>
